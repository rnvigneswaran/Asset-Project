<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="landingpage-main-conatiner">
        <div class="landing-page-header-container">
           <div class="landing-page-heading">
            <h1>
                ASSET MANAGEMENT TOOL
            </h1>
           </div> 
        </div>
        <div class="landing-page-login-container">
            <div class="landing-page-login-image-conatiner">
                 <img src="./Image Source/Asset Image.jpeg" alt="" class="logo-img">   
            </div>
            <div class="landing-page-login-details-container">
                <div class="login-heading">
                    <h2>
                        Login
                    </h2>
                </div>
                <div class="login-details">
                    <div class="login-username">
                        <label for="login-username">Username</label>
                        <input type="text" name="" id="login-username">
                    </div>
                    <div class="login-password">
                        <label for="login-password">Password</label>
                        <input type="password" name="" id="login-password">
                    </div>
                </div>
                <div class="login-button-conatiner">
                    <button type="submit">Login</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./app.js"></script>
</body>
</html>
